name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale drafts for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          gh api "repos/$REPO/releases" --jq ".[] | select(.tag_name == \"$TAG\" and .draft) | .id" | while read -r id; do
            gh api "repos/$REPO/releases/$id" --method DELETE
          done
          gh release create "$TAG" --repo "$REPO" --draft --title "Mim $TAG" --notes "Download the installer for your platform below."

  build:
    needs: create-release
    if: ${{ always() && !failure() && !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            build_args: ''
            label: macOS
          - os: ubuntu-22.04
            platform: linux
            build_args: '--x64'
            label: Linux
          - os: ubuntu-24.04-arm
            platform: linux
            build_args: '--arm64'
            label: Linux ARM64
          - os: windows-latest
            platform: win
            build_args: '--x64'
            label: Windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libglib2.0-dev rpm

      - run: npm ci

      - name: Build docx sidecar
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            node scripts/build-docx-worker.mjs osx-arm64
            node scripts/build-docx-worker.mjs osx-x64
          else
            node scripts/build-docx-worker.mjs
          fi

      - name: Verify docx sidecar resource
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            test -f resources/docx-worker/mac-arm64/docx-worker
            test -f resources/docx-worker/mac-x64/docx-worker
          else
            node scripts/verify-docx-worker-resource.mjs
          fi

      - name: Build & package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
          AZURE_TENANT_ID: ${{ matrix.platform == 'win' && secrets.AZURE_TENANT_ID || '' }}
          AZURE_CLIENT_ID: ${{ matrix.platform == 'win' && secrets.AZURE_CLIENT_ID || '' }}
          AZURE_CLIENT_SECRET: ${{ matrix.platform == 'win' && secrets.AZURE_CLIENT_SECRET || '' }}
          AZURE_CERT_PROFILE_NAME: ${{ matrix.platform == 'win' && vars.AZURE_CERT_PROFILE_NAME || '' }}
        run: npm run dist:${{ matrix.platform }} -- ${{ matrix.build_args }} --publish never

      - name: Upload artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.label }}
          path: |
            dist-installers/*.dmg
            dist-installers/*.zip
            dist-installers/*.exe
            dist-installers/*.AppImage
            dist-installers/*.deb
            dist-installers/*.tar.gz
            dist-installers/*.blockmap
            dist-installers/latest*.yml
          if-no-files-found: warn

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          # latest*.yml includes latest-linux-arm64.yml for Linux ARM64 AppImage updates.
          for f in dist-installers/*.dmg dist-installers/*.zip dist-installers/*.exe dist-installers/*.AppImage dist-installers/*.deb dist-installers/*.tar.gz dist-installers/*.blockmap dist-installers/latest*.yml; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --repo "$REPO" --clobber || true
          done

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
