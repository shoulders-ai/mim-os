name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: shoulders-ai/mim-apps
          path: mim-apps

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libglib2.0-dev

      - run: npm ci
      - run: npm test -- --silent

      - name: Verify app compatibility
        env:
          MIM_PACKAGES_DIR: ${{ github.workspace }}/mim-apps
        run: npm run test:packages:compat

      - run: npm run build

      - name: Verify generated documentation
        env:
          MIM_APPS_PATH: ${{ github.workspace }}/mim-apps
        run: |
          npm run docs:gen
          git diff --exit-code -- manual
          npm run docs:lint
